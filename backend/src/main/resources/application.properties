# ============================================
# Server
# ============================================
server.port=8080

# ============================================
# Database (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/placement_tracker?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mahak@5656
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
# validate: don't let Hibernate change your schema.sql design; just check it matches.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT
# ============================================
# In a real production app this secret would come from an environment variable, not a file in Git.
jwt.secret=ThisIsA256BitSecretKeyForPlacementTrackerJWTSigningChangeMe123!
jwt.expiration.ms=86400000

# ============================================
# Logging
# ============================================
logging.level.com.placementtracker=DEBUG
